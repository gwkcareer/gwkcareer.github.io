<!--
  Jekyll Simple Search loader — custom override
  미니멀 리스트 레이아웃 (시안 C)
-->

{% capture result_elem %}
<a href="{url}" class="sr-item">
  <div class="sr-accent"></div>
  <div class="sr-content">
    <div class="sr-item-meta"><i class="far fa-calendar fa-fw"></i> {date}{categories}</div>
    <h2 class="sr-item-title">{title}</h2>
    <p class="sr-item-desc">{content}</p>
  </div>
  {thumbnail}
</a>
{% endcapture %}

{% capture not_found %}<p class="sr-no-result">검색 결과가 없습니다.</p>{% endcapture %}

<script>
document.addEventListener('DOMContentLoaded', () => {
  const input = document.getElementById('search-input');
  const wrapper = document.getElementById('custom-search-wrapper');
  const keyword = document.getElementById('sr-keyword');
  const count = document.getElementById('sr-count');
  const results = document.getElementById('custom-search-results');
  const mainRows = document.getElementById('main-content-rows');

  if (input) input.value = '';
  if (wrapper) wrapper.style.display = 'none';

  function showSearch(q) {
    if (wrapper) wrapper.style.display = 'block';
    if (mainRows) mainRows.style.display = 'none';
    if (keyword) keyword.textContent = q;
  }

  function hideSearch() {
    if (wrapper) wrapper.style.display = 'none';
    if (mainRows) mainRows.style.display = '';
    if (keyword) keyword.textContent = '';
    if (count) count.textContent = '';
  }

  // MutationObserver로 결과 렌더링 완료 후 카운트 업데이트
  let observer = null;
  function observeResults() {
    if (observer) observer.disconnect();
    observer = new MutationObserver(() => {
      const n = results ? results.querySelectorAll('.sr-item').length : 0;
      if (count) count.textContent = n > 0 ? n + '건' : '';
    });
    if (results) {
      observer.observe(results, { childList: true, subtree: true });
    }
  }

  function handleInput() {
    const q = input ? input.value.trim() : '';
    if (q.length === 0) {
      hideSearch();
    } else {
      showSearch(q);
      observeResults();
    }
  }

  if (input) {
    input.addEventListener('input', handleInput);
    input.addEventListener('keyup', handleInput);
  }

  SimpleJekyllSearch({
    searchInput: input,
    resultsContainer: results,
    json: '{{ '/assets/js/data/search.json' | relative_url }}',
    searchResultTemplate: '{{ result_elem | strip_newlines }}',
    noResultsText: '{{ not_found }}',
    templateMiddleware: function(prop, value, template) {
      if (prop === 'categories') {
        if (!value) return '';
        var badges = value.split(',').map(function(c, i) {
          return '<span class="cat-badge cat-badge-' + ((i % 5) + 1) + '">' + c.trim() + '</span>';
        }).join('');
        return '<span class="cat-badges ms-1">' + badges + '</span>';
      }
      if (prop === 'tags') return '';
      if (prop === 'thumbnail') {
        if (!value) return '<div class="sr-thumb-placeholder">📝</div>';
        return '<img class="sr-thumb" src="' + value + '" alt="">';
      }
      if (prop === 'date') {
        if (!value) return '';
        return value.substring(0, 10).replace(/-/g, '/');
      }
    }
  });
});
</script>
